<script>
document.getElementById("forma_acceso").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const cedula = document.getElementById("cedula").value.trim();
    const telefono = document.getElementById("campo-palabra").value.trim();
    
    console.log("1. Enviando:", { cedula, telefono });
    
    if (!cedula || !telefono) {
        alert("Complete todos los campos");
        return;
    }
    
    const btn = document.getElementById("btn_ingresar");
    btn.disabled = true;
    btn.textContent = "Ingresando...";
    
    try {
        // Usar fetch con la URL correcta
        const respuesta = await fetch(`http://127.0.0.1:4000/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            credentials: 'include', 
            body: JSON.stringify({
                cedula: cedula,
                telefono: telefono  
            })
        });
        
        console.log("2. Status:", respuesta.status);
        
        const datos = await respuesta.json();
        console.log("3. Datos:", datos);
        
        if (respuesta.ok && datos.cedula) { 
                // Si hay una cédula en la respuesta, es que el login fue exitoso
                sessionStorage.setItem('nombre_tendero', datos.nombre);
                sessionStorage.setItem('cedula_tendero', datos.cedula);
                window.location.href = "Dashboard.html";
            
        } else {
            alert(datos.mensaje || datos.error || "Error al iniciar sesión");
            btn.disabled = false;
            btn.textContent = "Ingresar";
        }
        
    } catch (error) {
        console.error("Error:", error);
        alert("Error de conexión con el servidor");
        btn.disabled = false;
        btn.textContent = "Ingresar";
    }
});
</script>
